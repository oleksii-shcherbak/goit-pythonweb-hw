version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: contacts_postgres
    environment:
      POSTGRES_USER: contacts_user
      POSTGRES_PASSWORD: contacts_pass
      POSTGRES_DB: contacts_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
